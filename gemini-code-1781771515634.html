<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - สุภัสสรา เจ๊กนาม</title>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: #ffffff;
            width: 380px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 40px 30px;
            text-align: center;
            transition: transform 0.3s;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }
        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4CAF50;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
        }
        .title {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .info-container {
            text-align: left;
            background-color: #f8f9fa;
            padding: 15px 20px;
            border-radius: 12px;
        }
        .info-item {
            margin: 12px 0;
            font-size: 15px;
            color: #444;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 8px;
        }
        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .info-label {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <img src="https://drive.google.com/drive/home" alt="รูปโปรไฟล์" class="profile-pic">
    
    <h2>นางสาว สุภัสสรา เจ๊กนาม</h2>
    <div class="title">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</div>
    
    <div class="info-container">
        <div class="info-item">
            <span class="info-label">รหัสนักศึกษา:</span>
            <span>694245018</span>
        </div>
        <div class="info-item">
            <span class="info-label">สาขา:</span>
            <span>วิทยาการคอมพิวเตอร์</span>
        </div>
        <div class="info-item">
            <span class="info-label">คณะ:</span>
            <span>วิทยาศาสตร์และเทคโนโลยี</span>
        </div>
        <div class="info-item">
            <span class="info-label">เบอร์โทรศัพท์:</span>
            <span>0924972320</span>
        </div>
        <div class="info-item">
            <span class="info-label">อีเมล:</span>
            <span>cheknampad2550@gmail.com</span>
        </div>
    </div>
</div>

</body>
</html>
