<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - สุภัสสรา เจ๊กนาม</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'ChulaCharasNew', 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .profile-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }
        .header-cover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 140px;
            position: relative;
        }
        .profile-img-container {
            width: 140px;
            height: 140px;
            margin: -70px auto 0 auto;
            position: relative;
            z-index: 2;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            background-color: #e2e8f0;
        }
        .profile-content {
            padding: 24px 32px 32px 32px;
            text-align: center;
        }
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .student-id {
            display: inline-block;
            background: #edd6ff;
            color: #6b21a8;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 20px;
            margin-bottom: 28px;
        }
        .info-group {
            text-align: left;
            margin-bottom: 24px;
        }
        .info-group:last-child {
            margin-bottom: 0;
        }
        .group-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0aec0;
            margin-bottom: 12px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 6px;
            font-weight: 700;
        }
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-icon {
            width: 36px;
            height: 36px;
            background: #f7fafc;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 14px;
            border: 1px solid #e2e8f0;
        }
        .info-icon svg {
            width: 18px;
            height: 18px;
            fill: #4a5568;
        }
        .info-details {
            flex: 1;
        }
        .info-label {
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 2px;
        }
        .info-text {
            font-size: 15px;
            color: #4a5568;
            font-weight: 500;
        }
        .footer {
            background: #f7fafc;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #baf3e6;
            color: #a0aec0;
            border-top: 1px solid #edf2f7;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- ส่วนหัวการ์ด -->
        <div class="header-cover"></div>
        
        <!-- รูปโปรไฟล์ -->
        <div class="profile-img-container">
            <img src="profile.jpg" alt="รูปโปรไฟล์ สุภัสสรา" class="profile-img">
        </div>
        
        <!-- เนื้อหาข้อมูล -->
        <div class="profile-content">
            <h1 class="profile-name">สุภัสสรา เจ๊กนาม</h1>
            <span class="student-id">รหัสนักศึกษา: 694245018</span>
            
            <!-- หมวดหมู่: ข้อมูลการศึกษา -->
            <div class="info-group">
                <div class="group-title">ข้อมูลการศึกษา</div>
                
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
                    </div>
                    <div class="info-details">
                        <div class="info-label">สาขาวิชา</div>
                        <div class="info-text">วิทยาการคอมพิวเตอร์</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
                    </div>
                    <div class="info-details">
                        <div class="info-label">คณะ</div>
                        <div class="info-text">คณะวิทยาศาสตร์และเทคโนโลยี</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L12 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    </div>
                    <div class="info-details">
                        <div class="info-label">มหาวิทยาลัย</div>
                        <div class="info-text">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</div>
                    </div>
                </div>
            </div>
            
            <!-- หมวดหมู่: ข้อมูลการติดต่อ -->
            <div class="info-group">
                <div class="group-title">ข้อมูลการติดต่อ</div>
                
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    </div>
                    <div class="info-details">
                        <div class="info-label">เบอร์โทรศัพท์</div>
                        <div class="info-text">092-497-2320</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    </div>
                    <div class="info-details">
                        <div class="info-label">อีเมล</div>
                        <div class="info-text">694245018@mcro.ac.th</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- ส่วนท้ายการ์ด -->
        <div class="footer">
            Student Profile Card &copy; 2026
        </div>
    </div>

</body>
</html>
